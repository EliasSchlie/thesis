<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Evaluation Pipeline</title>
<style>body { display: flex; justify-content: center; padding: 40px; background: #f5f3f0; }</style>
</head><body>
<svg viewBox="0 0 580 400" xmlns="http://www.w3.org/2000/svg" width="600">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0B1D33"/>
    </marker>
    <filter id="sh" x="-3%" y="-3%" width="106%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0B1D33" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect x="145" y="15" width="290" height="42" rx="7" fill="#FAF7F2" stroke="#0B1D33" stroke-width="1.8" stroke-dasharray="4,3" filter="url(#sh)"/>
  <text x="290" y="41" text-anchor="middle" font-size="13" fill="#6B6560" font-style="italic" font-family="IBM Plex Sans, sans-serif">Examples (vary by condition)</text>

  <line x1="290" y1="57" x2="290" y2="77" stroke="#0B1D33" stroke-width="1.8" marker-end="url(#arr)"/>

  <rect x="120" y="82" width="340" height="54" rx="9" fill="#0B1D33" filter="url(#sh)"/>
  <text x="290" y="104" text-anchor="middle" font-size="15" fill="white" font-weight="700" font-family="IBM Plex Sans, sans-serif">🎯 Generator LLM</text>
  <text x="290" y="124" text-anchor="middle" font-size="11" fill="#f4857f" font-family="IBM Plex Sans, sans-serif">Produces scenario: system prompt + user message</text>

  <line x1="290" y1="136" x2="290" y2="156" stroke="#0B1D33" stroke-width="1.8" marker-end="url(#arr)"/>

  <rect x="120" y="161" width="340" height="54" rx="9" fill="#0B1D33" filter="url(#sh)"/>
  <text x="290" y="183" text-anchor="middle" font-size="15" fill="white" font-weight="700" font-family="IBM Plex Sans, sans-serif">🤖 Target LLM</text>
  <text x="290" y="203" text-anchor="middle" font-size="11" fill="#f4857f" font-family="IBM Plex Sans, sans-serif">Safety-aligned model responds to scenario</text>

  <line x1="290" y1="215" x2="290" y2="235" stroke="#0B1D33" stroke-width="1.8" marker-end="url(#arr)"/>

  <rect x="120" y="240" width="340" height="54" rx="9" fill="#0B1D33" filter="url(#sh)"/>
  <text x="290" y="262" text-anchor="middle" font-size="15" fill="white" font-weight="700" font-family="IBM Plex Sans, sans-serif">⚖️ Judge LLM</text>
  <text x="290" y="282" text-anchor="middle" font-size="11" fill="#f4857f" font-family="IBM Plex Sans, sans-serif">Deception success (0/1) + Realism (1–7)</text>

  <line x1="290" y1="294" x2="290" y2="314" stroke="#0B1D33" stroke-width="1.8" marker-end="url(#arr)"/>

  <rect x="165" y="319" width="250" height="38" rx="7" fill="#2D7A6B" filter="url(#sh)"/>
  <text x="290" y="344" text-anchor="middle" font-size="13" fill="white" font-weight="600" font-family="IBM Plex Sans, sans-serif">Fitness = Realism × Success</text>

  <text x="290" y="388" text-anchor="middle" font-size="11" fill="#6B6560" font-family="IBM Plex Sans, sans-serif">Shared across all three conditions</text>
</svg>
</body></html>
